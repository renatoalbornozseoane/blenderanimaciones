<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animaciones Blender | Portafolio</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Fondo animado -->
  <div class="fondo-animado"></div>

  <header>
    <h1 class="titulo">🎬 Animaciones en Blender</h1>
    <p class="subtitulo">Presento mis animaciones</p>
  </header>

  <main>
    <section class="video-card fade-in">
      <h2>🥛 Yogurcito</h2>
      <video controls preload="metadata">
        <source src="videos/Yogurcito.mp4" type="video/mp4">
        Tu navegador no soporta la reproducción de video.
      </video>
      <p>Presentamos a un yogurcito <span class="resalte">TORPE</span>😆</p>
    </section>

    <section class="video-card fade-in">
      <h2>🤸 Gimnasta</h2>
      <video controls preload="metadata">
        <source src="videos/gimnasta.mp4" type="video/mp4">
        Tu navegador no soporta la reproducción de video.
      </video>
      <p>Un gimnasta con movimientos <span class="resalte">INCREÍBLES</span>🤩</p>
    </section>

    <!-- Duplica esta sección para más animaciones -->
  </main>

  <footer>
    <p>Hecho con Blender · © 2026</p>
  </footer>

</body>
</html>
